# Dependabot keeps dependencies and CI actions current automatically.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ---- Python dependencies -------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    # Group related updates into single PRs to cut review noise and keep the
    # dev toolchain (black/ruff/isort/mypy) moving together so the pinned
    # versions in requirements-dev.txt and .pre-commit-config.yaml stay in sync.
    groups:
      dev-tooling:
        applies-to: version-updates
        patterns:
          - "black"
          - "ruff"
          - "isort"
          - "mypy"
          - "types-*"
          - "pytest*"
          - "bandit"
          - "detect-secrets"
          - "build"
          - "wheel"
      runtime:
        applies-to: version-updates
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  # ---- GitHub Actions used in workflows ------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
