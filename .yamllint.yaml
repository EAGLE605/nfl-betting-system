# yamllint configuration — relaxed rules suited to GitHub Actions workflows.
# Referenced by .pre-commit-config.yaml (yamllint hook).
extends: default

rules:
  # GitHub Actions `on:` key is parsed by yamllint as the boolean `true`.
  truthy:
    allowed-values: ["true", "false", "on", "off"]
    check-keys: false
  line-length:
    max: 120
    level: warning
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  braces:
    max-spaces-inside: 1
  indentation:
    spaces: consistent
    indent-sequences: consistent

ignore: |
  .venv/
  venv/
  node_modules/
