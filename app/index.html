<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>NFL Picks</title>

    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icon-192.png">

    <style>
        /* Design Tokens */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-card: #1f1f1f;

            --text-primary: #fafafa;
            --text-secondary: #a1a1a1;
            --text-muted: #666;

            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;

            --border: #2a2a2a;
            --border-subtle: #1f1f1f;

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;

            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);

            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            --font-mono: "SF Mono", "Fira Code", monospace;

            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* App Shell */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md);
            border-bottom: 1px solid var(--border-subtle);
            background: var(--bg-secondary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .week-selector {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .week-selector button {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.875rem;
        }

        .week-selector button:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .week-selector span {
            font-weight: 500;
            min-width: 80px;
            text-align: center;
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-md);
        }

        /* Pick Card */
        .pick-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-md);
            border: 1px solid var(--border);
            container-type: inline-size;
        }

        .pick-card.strong {
            border-left: 4px solid var(--accent-green);
        }

        .pick-card.lean {
            border-left: 4px solid var(--accent-yellow);
        }

        .pick-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-md);
        }

        .signal {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .signal.strong { color: var(--accent-green); }
        .signal.lean { color: var(--accent-yellow); }

        .confidence {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .pick-main {
            margin-bottom: var(--space-lg);
        }

        .pick-team {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: var(--space-xs);
        }

        .matchup {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Reasoning */
        .reasoning {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .reasoning-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }

        .reasoning-list {
            list-style: none;
        }

        .reasoning-list li {
            display: flex;
            align-items: flex-start;
            gap: var(--space-sm);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: var(--space-xs);
            color: var(--text-primary);
        }

        .reasoning-list li::before {
            content: "✓";
            color: var(--accent-green);
            flex-shrink: 0;
        }

        /* Bet Buttons */
        .bet-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-sm);
        }

        .bet-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .bet-btn:active {
            transform: scale(0.98);
        }

        .bet-btn.dk {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3a 100%);
            color: #4ade80;
            border: 1px solid #2d5a3a;
        }

        .bet-btn.fd {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
            color: #60a5fa;
            border: 1px solid #2d4a6f;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: var(--space-md);
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-subtle);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.positive { color: var(--accent-green); }
        .stat-value.negative { color: var(--accent-red); }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--space-xl);
            color: var(--text-secondary);
        }

        .empty-state h2 {
            margin-bottom: var(--space-sm);
            color: var(--text-primary);
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @container (max-width: 400px) {
            .pick-team {
                font-size: 1.25rem;
            }
            .bet-buttons {
                grid-template-columns: 1fr;
            }
        }

        /* Safe area for notched phones */
        @supports (padding: env(safe-area-inset-bottom)) {
            .stats-bar {
                padding-bottom: calc(var(--space-md) + env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">🏈 Picks</div>
            <div class="week-selector">
                <button id="prev-week">←</button>
                <span id="week-display">Week 1</span>
                <button id="next-week">→</button>
            </div>
        </header>

        <main id="picks-container">
            <div class="loading">Loading picks...</div>
        </main>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="record">-</div>
                <div class="stat-label">Record</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="roi">-</div>
                <div class="stat-label">ROI</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="streak">-</div>
                <div class="stat-label">Streak</div>
            </div>
        </div>
    </div>

    <script>
        // App State
        const state = {
            season: 2026,
            week: 1,
            picks: [],
            history: []
        };

        // DOM Elements
        const picksContainer = document.getElementById('picks-container');
        const weekDisplay = document.getElementById('week-display');
        const recordEl = document.getElementById('record');
        const roiEl = document.getElementById('roi');
        const streakEl = document.getElementById('streak');

        // Render a single pick card
        function renderPick(pick) {
            const signalClass = pick.signal.toLowerCase();
            const signalEmoji = pick.signal === 'STRONG' ? '🟢' : '🟡';

            return `
                <div class="pick-card ${signalClass}">
                    <div class="pick-header">
                        <div class="signal ${signalClass}">
                            ${signalEmoji} ${pick.signal}
                        </div>
                        <div class="confidence">${pick.confidence}% confident</div>
                    </div>

                    <div class="pick-main">
                        <div class="pick-team">${pick.pick_team} ${pick.pick_type === 'ML' ? 'ML' : pick.line}</div>
                        <div class="matchup">${pick.away_team} @ ${pick.home_team}</div>
                    </div>

                    <div class="reasoning">
                        <div class="reasoning-title">Why this hits</div>
                        <ul class="reasoning-list">
                            ${pick.reasons.map(r => `<li>${r}</li>`).join('')}
                        </ul>
                    </div>

                    <div class="bet-buttons">
                        <a href="${getDraftKingsLink(pick)}" class="bet-btn dk" target="_blank"
                           onclick="if(pick.deep_links?.draftkings?.app){openSportsbook('${pick.deep_links?.draftkings?.app || ''}','${getDraftKingsLink(pick)}');return false;}">
                            DraftKings
                        </a>
                        <a href="${getFanDuelLink(pick)}" class="bet-btn fd" target="_blank">
                            FanDuel
                        </a>
                    </div>
                </div>
            `;
        }

        // Generate sportsbook links with app deep linking
        function getDraftKingsLink(pick) {
            if (pick.deep_links?.draftkings) {
                return pick.deep_links.draftkings.web;
            }
            const query = encodeURIComponent(`${pick.away_team} ${pick.home_team} NFL`);
            return `https://sportsbook.draftkings.com/leagues/football/nfl?search=${query}`;
        }

        function getFanDuelLink(pick) {
            if (pick.deep_links?.fanduel) {
                return pick.deep_links.fanduel.web;
            }
            const query = encodeURIComponent(`${pick.away_team} vs ${pick.home_team}`);
            return `https://sportsbook.fanduel.com/navigation/nfl?search=${query}`;
        }

        // Try app deep link with web fallback
        function openSportsbook(appUrl, webUrl) {
            const start = Date.now();
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = appUrl;
            document.body.appendChild(iframe);

            setTimeout(() => {
                document.body.removeChild(iframe);
                if (Date.now() - start < 2000) {
                    window.location.href = webUrl;
                }
            }, 1500);
        }

        // Render all picks
        function renderPicks() {
            const strongPicks = state.picks.filter(p => p.signal === 'STRONG');
            const leanPicks = state.picks.filter(p => p.signal === 'LEAN');

            if (strongPicks.length === 0 && leanPicks.length === 0) {
                picksContainer.innerHTML = `
                    <div class="empty-state">
                        <h2>No picks this week</h2>
                        <p>All games below confidence threshold</p>
                    </div>
                `;
                return;
            }

            let html = '';

            if (strongPicks.length > 0) {
                html += strongPicks.map(renderPick).join('');
            }

            if (leanPicks.length > 0) {
                html += leanPicks.map(renderPick).join('');
            }

            picksContainer.innerHTML = html;
        }

        // Update stats display
        function updateStats() {
            const settled = state.history.filter(p => p.outcome);
            const wins = settled.filter(p => p.outcome === 'W').length;
            const losses = settled.filter(p => p.outcome === 'L').length;

            recordEl.textContent = `${wins}-${losses}`;

            if (wins + losses > 0) {
                const roi = ((wins * 0.91 - losses) / (wins + losses) * 100);
                roiEl.textContent = `${roi >= 0 ? '+' : ''}${roi.toFixed(0)}%`;
                roiEl.className = `stat-value ${roi >= 0 ? 'positive' : 'negative'}`;
            }

            // Calculate streak
            const recent = settled.slice(-5).map(p => p.outcome);
            streakEl.textContent = recent.join('') || '-';
        }

        // Fetch picks from API
        async function fetchPicks() {
            picksContainer.innerHTML = '<div class="loading">Loading picks...</div>';

            try {
                const res = await fetch(`/api/picks?season=${state.season}&week=${state.week}`);
                const data = await res.json();
                state.picks = data.picks || [];
                renderPicks();
            } catch (err) {
                // Demo mode - show sample data
                state.picks = [
                    {
                        game_id: "2026_01_KC_BAL",
                        season: 2026,
                        week: 1,
                        home_team: "KC",
                        away_team: "BAL",
                        pick_team: "KC",
                        pick_type: "ML",
                        confidence: 71.2,
                        signal: "STRONG",
                        reasons: [
                            "KC EPA +0.14 advantage",
                            "KC RB efficiency top 5",
                            "Model highly confident (71%)",
                            "Home field advantage"
                        ]
                    },
                    {
                        game_id: "2026_01_BUF_MIA",
                        season: 2026,
                        week: 1,
                        home_team: "MIA",
                        away_team: "BUF",
                        pick_team: "BUF",
                        pick_type: "ML",
                        confidence: 64.8,
                        signal: "LEAN",
                        reasons: [
                            "BUF EPA +0.08 vs MIA -0.02",
                            "Model confident (65%)"
                        ]
                    }
                ];
                renderPicks();
            }
        }

        // Fetch history
        async function fetchHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                state.history = data.picks || [];
                updateStats();
            } catch {
                state.history = [];
                updateStats();
            }
        }

        // Week navigation
        document.getElementById('prev-week').addEventListener('click', () => {
            if (state.week > 1) {
                state.week--;
                weekDisplay.textContent = `Week ${state.week}`;
                fetchPicks();
            }
        });

        document.getElementById('next-week').addEventListener('click', () => {
            if (state.week < 18) {
                state.week++;
                weekDisplay.textContent = `Week ${state.week}`;
                fetchPicks();
            }
        });

        // Init
        fetchPicks();
        fetchHistory();

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
