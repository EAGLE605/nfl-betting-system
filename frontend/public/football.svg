<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B3A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A2708;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0f"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>

  <!-- Football shape (rotated ellipse) -->
  <ellipse cx="50" cy="50" rx="30" ry="18" fill="url(#ballGradient)" transform="rotate(-30 50 50)"/>

  <!-- Football laces -->
  <g transform="rotate(-30 50 50)">
    <!-- Center seam -->
    <line x1="50" y1="38" x2="50" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>

    <!-- Cross laces -->
    <line x1="44" y1="43" x2="56" y2="43" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="43" y1="48" x2="57" y2="48" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="43" y1="53" x2="57" y2="53" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="58" x2="56" y2="58" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Shine effect -->
  <ellipse cx="38" cy="42" rx="8" ry="4" fill="rgba(255,255,255,0.15)" transform="rotate(-30 38 42)"/>
</svg>
