[tool.ruff]
# Exclude common directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    ".eggs",
]

# Same as Black line length
line-length = 88

# Target Python 3.10+
target-version = "py310"

[tool.ruff.lint]
# Enable specific rule sets
select = [
    "E",  # pycodestyle errors
    "F",  # Pyflakes
    "I",  # isort
]

# Ignore specific rules
ignore = [
    "E501",  # Line too long (handled by Black)
]

[tool.ruff.lint.per-file-ignores]
# Ignore E402 (module level import not at top) in scripts and modules that
# manipulate sys.path before importing. Also suppress pre-existing warnings.
"scripts/*.py" = ["E402", "E741", "F841"]
"src/features/pipeline.py" = ["E402"]

# Dashboard uses try/except ImportError for auth lib availability and has
# intentional mid-file imports (os, sqlite3) after st.set_page_config().
# Also suppress pre-existing bare-except, star-import, and redefinition warnings.
"dashboard/*.py" = ["E402", "E712", "E722", "E741", "F401", "F403", "F405", "F541", "F811", "F841"]
"dashboard/**/*.py" = ["E402", "E712", "E722", "E741", "F401", "F403", "F405", "F541", "F811", "F841"]

# Allow unused variables in tests (often needed for fixtures)
"tests/*.py" = ["F841"]

[tool.ruff.lint.isort]
# Use Black-compatible import sorting
known-first-party = ["src"]

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 88
known_first_party = ["src"]
